<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="70%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow behind target -->
  <ellipse cx="920" cy="315" rx="280" ry="280" fill="url(#glow)"/>

  <!-- Subtle horizontal rule -->
  <line x1="0" y1="628" x2="1200" y2="628" stroke="#00ffcc" stroke-width="3" opacity="0.6"/>

  <!-- === LEFT TEXT BLOCK === -->

  <!-- URL label -->
  <text x="72" y="118" font-family="'Courier New', Courier, monospace" font-size="20" fill="#00ffcc" opacity="0.55" letter-spacing="5">DEADCENTER.FUN</text>

  <!-- Main title -->
  <text x="68" y="262" font-family="'Courier New', Courier, monospace" font-size="108" font-weight="bold" fill="#ffffff" letter-spacing="-3">deadcenter</text>

  <!-- Accent bar under title -->
  <rect x="68" y="282" width="580" height="2.5" fill="#00ffcc" opacity="0.35"/>

  <!-- Tagline -->
  <text x="68" y="352" font-family="'Courier New', Courier, monospace" font-size="38" fill="#00ffcc" letter-spacing="6" opacity="0.95">stop · the · dot</text>

  <!-- Sub-descriptor -->
  <text x="72" y="428" font-family="'Courier New', Courier, monospace" font-size="21" fill="#666666" letter-spacing="2">ONE INPUT. ONE CHANCE. 20 LEVELS.</text>

  <!-- Corner bracket top-left -->
  <path d="M52,52 L52,20 L84,20" stroke="#00ffcc" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Corner bracket bottom-left -->
  <path d="M52,578 L52,610 L84,610" stroke="#00ffcc" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- === RIGHT CROSSHAIR TARGET === -->

  <!-- Outermost decorative ring -->
  <circle cx="920" cy="315" r="242" stroke="#00ffcc" stroke-width="1" fill="none" opacity="0.08"/>

  <!-- Outer ring -->
  <circle cx="920" cy="315" r="198" stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.18"/>

  <!-- Main outer ring -->
  <circle cx="920" cy="315" r="150" stroke="#00ffcc" stroke-width="2.5" fill="none" opacity="0.85"/>

  <!-- Inner ring -->
  <circle cx="920" cy="315" r="82" stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.55"/>

  <!-- Crosshair — top -->
  <line x1="920" y1="88" x2="920" y2="215" stroke="#00ffcc" stroke-width="2.5" opacity="0.88"/>
  <!-- Crosshair — bottom -->
  <line x1="920" y1="415" x2="920" y2="542" stroke="#00ffcc" stroke-width="2.5" opacity="0.88"/>
  <!-- Crosshair — left -->
  <line x1="693" y1="315" x2="818" y2="315" stroke="#00ffcc" stroke-width="2.5" opacity="0.88"/>
  <!-- Crosshair — right (extends to edge) -->
  <line x1="1022" y1="315" x2="1180" y2="315" stroke="#00ffcc" stroke-width="2.5" opacity="0.88"/>

  <!-- The moving dot (off-center = not dead center yet) -->
  <circle cx="968" cy="272" r="15" fill="#ff4455" opacity="0.92"/>
  <!-- Dot glow -->
  <circle cx="968" cy="272" r="26" fill="#ff4455" opacity="0.18"/>

  <!-- Center point (the target) -->
  <circle cx="920" cy="315" r="5.5" fill="#00ffcc" opacity="1"/>

  <!-- Corner brackets around target area -->
  <path d="M692,88 L692,56 L724,56" stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M1148,88 L1148,56 L1116,56" stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M692,542 L692,574 L724,574" stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M1148,542 L1148,574 L1116,574" stroke="#00ffcc" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
